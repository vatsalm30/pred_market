name: Refresh market data

on:
  schedule:
    # Price refresh — every 30 minutes
    - cron: '*/30 * * * *'
    # Full rediscovery — every 2 hours (fetches all markets, updates match list)
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      full:
        description: 'Run full market rediscovery (slow)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore matched_markets cache
        uses: actions/cache@v4
        with:
          path: matched_markets.csv
          key: matched-markets-${{ runner.os }}

      - name: Run pipeline
        env:
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
        run: |
          MANUAL_FULL="${{ github.event.inputs.full }}"
          SCHEDULE="${{ github.event.schedule }}"
          if [ "$SCHEDULE" = "0 */2 * * *" ] || [ "$MANUAL_FULL" = "true" ]; then
            echo "Running full mode"
            python run_pipeline.py --full
          else
            echo "Running price refresh mode"
            python run_pipeline.py
          fi

      - name: Save matched_markets cache
        uses: actions/cache/save@v4
        with:
          path: matched_markets.csv
          key: matched-markets-${{ runner.os }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/matched_markets.json \
                  web/public/data/arbitrage_opportunities.json
          git diff --staged --quiet || git commit -m "chore: refresh market data [skip ci]"
          git push
